# Profil de niche : IA expliquée par l'Histoire (profil par défaut)
# Ce fichier surcharge config.yaml pour les paramètres spécifiques à cette niche.
# Seules les clés présentes ici remplacent les valeurs globales.

project:
  niche: ia_histoire
  language: fr

trends:
  google:
    geo: FR
    hl: fr-FR
  reddit:
    subreddits:
      - artificial
      - MachineLearning
      - singularity
      - histoire
      - france

script_generation:
  narration_style: "historique, pédagogique, vivant"
  template_pool:
    - revelation
    - parallele_inverse
    - countdown

uploader:
  default_tags:
    - IA
    - Histoire
    - Vulgarisation
    - MachineLearning
    - Shorts
