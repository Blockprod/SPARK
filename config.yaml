# shorts-engine global configuration
# All runtime-sensitive secrets stay in .env.
# This file stores deterministic pipeline behavior and defaults.

project:
  name: shorts-engine
  timezone: Europe/Paris
  language: fr
  niche: "L'IA expliquee par l'Histoire"

paths:
  logs_dir: ./logs
  outputs_dir: ./outputs
  prompts_dir: ./prompts
  # Optional dedicated folders under outputs
  clips_dir: ./outputs/clips
  audio_dir: ./outputs/audio
  renders_dir: ./outputs/renders
  temp_dir: ./outputs/tmp

logging:
  # JSON logs per run in logs/
  level: INFO
  json: true
  run_log_prefix: run

pipeline:
  # Shorts constraints
  min_duration_sec: 50
  max_duration_sec: 60
  max_scenes: 8
  target_aspect_ratio: "9:16"
  target_width: 480
  target_height: 832
  target_fps: 16

  # Concurrency guard: maximum simultaneous pipeline runs (avoids GPU OOM)
  max_concurrent_runs: 1

  # Global hard timeout per run — protects the semaphore from deadlock on GPU hang
  global_timeout_sec: 7200  # 2 hours; increase if LTX renders take longer

  # Flow controls — reserved for future parallelism and cleanup flags
  keep_intermediate_files: false  # set true to preserve clips/audio after each run

trends:
  # Weighted score for ranking candidate topics
  scoring_weights:
    google_volume: 0.35
    google_momentum: 0.30
    reddit_mentions: 0.20
    reddit_engagement: 0.15

  google:
    geo: FR
    hl: fr-FR
    tz: 60
    cat: 0
    timeframe: now 7-d
    max_topics: 20

  reddit:
    subreddits:
      - artificial
      - MachineLearning
      - singularity
      - histoire
      - france
    lookback_hours: 72
    max_posts_per_subreddit: 25
    min_score: 5

script_generation:
  provider: gemini
  model: gemini-2.5-flash
  temperature: 0.8
  top_p: 0.95
  max_output_tokens: 8192

  # Narrative templates rotated at each run to avoid repetition
  template_pool:
    - revelation
    - parallele_inverse
    - countdown

  # Output contract expected from LLM
  output_format: strict_json
  narration_style: "historique, pedagogique, vivant"
  include_hooks: true
  include_cta: true

video_generation:
  provider: wan
  # Wan2.1 1.3B — downloaded automatically by Diffusers on first run (~8 Go, ~5 min)
  # Compatible T4 Colab gratuit (16 Go VRAM) — aucun A100 requis
  model_id: Wan-AI/Wan2.1-T2V-1.3B-Diffusers
  device: cuda
  num_frames: 81        # 4*20+1 = ~5 sec a 16 fps
  num_inference_steps: 25
  guidance_scale: 5.0
  use_cpu_offload: false  # T4 a 16 Go, modele ~8 Go — .to(cuda) direct est plus rapide

  generation:
    seed: -1  # -1 = seed deterministe par run_id

  scenes:
    max_scene_duration_sec: 5

audio_generation:
  active_backend: edge_tts   # edge_tts (recommended) or kokoro

  # Edge TTS — Microsoft Neural TTS, free, no GPU needed, excellent French quality
  # Voices: fr-FR-DeniseNeural (warm female), fr-FR-HenriNeural (professional male)
  #         fr-FR-VivienneNeural (expressive female), fr-FR-EloiseNeural (young female)
  edge_tts:
    voice: fr-FR-DeniseNeural
    rate: "-5%"    # slight slowdown for clearer articulation on Shorts
    pitch: "+0Hz"

  language: fr-fr  # used by Kokoro fallback only

  kokoro:
    # Kokoro local ONNX — fallback if edge_tts unavailable
    model_path: ./models/kokoro-v1.0.fp16.onnx
    voices_path: ./models/voices-v1.0.bin
    voice: ff_siwis  # only FR voice in Kokoro-82M
    speed: 1.0
    sample_rate: 24000
    output_format: wav

post_production:
  ffmpeg:
    video_codec: libx264
    audio_codec: aac
    crf: 20
    preset: medium
    audio_bitrate: 192k
    pix_fmt: yuv420p
    threads: 0

  subtitles:
    enabled: true
    max_chars_per_line: 42
    max_lines: 2
    line_padding_ms: 120
    style:
      font_name: Arial
      font_size: 48
      bold: true
      primary_color: "&H00FFFFFF"
      outline_color: "&H00000000"
      back_color: "&H80000000"
      outline: 3
      shadow: 1
      alignment: 2
      margin_v: 80

uploader:
  provider: youtube_data_api_v3
  default_privacy_status: private
  notify_subscribers: false
  category_id: 28
  default_tags:
    - IA
    - Histoire
    - Vulgarisation
    - Tech
    - Shorts

platforms:
  youtube:
    enabled: true   # Primary distribution channel
  tiktok:
    enabled: false  # Set to true + TIKTOK_ACCESS_TOKEN in .env to enable
  instagram:
    enabled: false  # Set to true + INSTAGRAM_* vars in .env to enable

scheduler:
  enabled: true
  timezone: Europe/Paris
  max_workers: 4
  misfire_grace_time_sec: 300
  coalesce: true
  max_shorts_per_week: 7

  # Peak slots for FR Shorts audience (can be tuned from dashboard later)
  default_publish_slots:
    - "12:30"
    - "18:30"
    - "21:00"

  # Per-profile scheduling (optional — each niche can have its own slots)
  # Set enabled: true and define publish_slots to activate per-profile jobs.
  profiles:
    ia_histoire:
      enabled: false
      publish_slots:
        - "12:30"
        - "21:00"
    finance_perso:
      enabled: false
      publish_slots:
        - "18:30"

dashboard:
  host: 127.0.0.1
  port: 8000
  trends_cache_ttl_minutes: 10
  sse_heartbeat_sec: 5
  allow_origins:
    - http://127.0.0.1:8000
    - http://localhost:8000
